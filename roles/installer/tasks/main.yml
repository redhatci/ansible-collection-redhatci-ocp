---
# tasks file for installer
- name: Include OC client download tasks
  include_tasks: 10_get_oc.yml
  tags:
  - cleanup
  - getoc
  - create_registry

- name: Include existing disconnected registry configuration
  include_tasks: 15_disconnected_registry_existing.yml
  when:
    - disconnected_registry is defined
    - disconnected_registry == "existing"
  tags: disconnected

- name: Include disconnected registry creation
  include_tasks: 15_disconnected_registry_create.yml
  when:
    - disconnected_registry is defined
    - disconnected_registry == "create"
  tags:
    - disconnected
    - create_registry

- name: Include installer extraction
  include_tasks: 20_extract_installer.yml
  tags:
    - pullsecret
    - extract
- name: Include RHCOS image paths setup
  include_tasks: 23_rhcos_image_paths.yml
  when: release_version is ansible.builtin.version('4.3', '<=') or cache_enabled|bool
  tags: rhcospath
- name: Include RHCOS image cache setup
  include_tasks: 24_rhcos_image_cache.yml
  when: cache_enabled|bool
  tags: cache


- name: Include install-config creation
  include_tasks: 25_create-install-config.yml
  tags: installconfig
- name: Include Metal3 configuration
  include_tasks: 30_create_metal3.yml
  when: release_version is ansible.builtin.version('4.3', '<=')
  tags: metal3config
- name: Include manifest creation
  include_tasks: 40_create_manifest.yml
  tags: manifests
- name: Include extra manifests
  include_tasks: 50_extramanifests.yml
  tags: extramanifests
- name: Include filesystem customization
  include_tasks: 55_customize_filesystem.yml
  tags: customfs
- name: Include bootstrap cleanup
  include_tasks: 59_cleanup_bootstrap.yml
  tags: cleanup
- name: Include cluster servers power off
  include_tasks: 59_power_off_cluster_servers.yml
  tags: powerservers
- name: Include OCP deployment
  include_tasks: 60_deploy_ocp.yml
  tags: install
# - include_tasks: 70_cleanup_sub_man_registration.yml
#  tags: unregister
