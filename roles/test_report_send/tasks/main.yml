---
# tasks file main.yml for redhatci.ocp.test_report_send

- name: DBG Print all required variables
  ansible.builtin.debug:
    msg:
      - "trs_collector: '{{ trs_collector }}'"
      - "trs_collector_auth_token: '{{ trs_collector_auth_token }}'"
      - "trs_collector_auth_headers: '{{ trs_collector_auth_headers }}'"

- name: DBG fail here
  ansible.builtin.fail:
    msg: "yay"


- name: Validate all required variables are defined
  ansible.builtin.assert:
    that: "{{ condition }}"
    fail_msg:
      - "The condition {{ condition }} does not happen"
  loop:
    - trs_collector in trs_collectors_supported
    - ((trs_collector_auth_token | length > 0) or (trs_collector_auth_headers | length > 0))
  loop_control:
    loop_var: condition

- name: Ensure presence and readability for file {{ trs_report_path }}
  ansible.builtin.include_tasks:
    file: "ensure-file.yml"
  loop:
    - "{{ trs_report_path }}"
  loop_control:
    loop_var: file_path

# CREDITS: lovingly copied from @cplacani PR: https://github.com/openshift-kni/eco-validation/pull/150/files

- name: Collect trs_metadata_path file stat
  ansible.builtin.stat:
    path: "{{ trs_metadata_path }}"
  register: _trs_metadata_path_stat
  when:
    - trs_metadata_path | length > 0

- name: Read content of metadata JSON file
  ansible.builtin.slurp:
    src: "{{ trs_metadata_path }}"
  register: _trs_metadata_file_content
  when:
    - _trs_metadata_path_stat.stat.isreg | default(false)

- name: Decode JSON content for metadata file
  ansible.builtin.set_fact:
    trs_meta_data: "{{ _trs_metadata_file_content.content | b64decode | from_json }}"
  when:
    - _trs_metadata_file_content.content | default("") | length > 0

- name: Detect Runtime Metadata from our environment
  ansible.builtin.include_tasks:
    file: "metadata-detect.yml"

- name: Send trs_data_event to collector {{ trs_collector }}
  ansible.builtin.include_tasks:
    file: "reporting/{{ trs_collector }}.yml"
  tags:
    - inproc
    - validation
