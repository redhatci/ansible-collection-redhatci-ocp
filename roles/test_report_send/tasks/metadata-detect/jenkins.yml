---
# Jenkins metadata detection tasks for redhatci.ocp.test_report_send

- name: Set is_ci attribute
  ansible.builtin.set_fact:
    trs_ci_runtime: "{{ trs_ci_runtime | combine({'is_ci': true}) }}"
  when:
    - lookup("env", "CI") | lower == "true"

- name: Update trs_ci_runtime.type for {{ trs_ci_system }}
  ansible.builtin.set_fact:
    trs_ci_runtime: "{{ trs_ci_runtime | combine({'type': trs_ci_system}) }}"

- name: Update trs_ci_runtime.url for {{ trs_ci_system }}
  ansible.builtin.set_fact:
    trs_ci_runtime: "{{ trs_ci_runtime | combine({'url': lookup('env', 'JENKINS_URL')}) }}"

- name: Update trs_ci_runtime.job for {{ trs_ci_system }}
  ansible.builtin.set_fact:
    trs_ci_runtime: "{{ trs_ci_runtime | combine({'job': lookup('env', 'JOB_NAME')}) }}"
  when:
    - lookup("env", "JOB_URL") | length > 0
