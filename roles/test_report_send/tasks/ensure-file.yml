---
# tasks file ensure-file.yml for redhatci.ocp.test_report_send

- name: Print value of var file_path
  ansible.builtin.debug:
    var: file_path

- name: Collect file stat for file {{ file_path }}
  ansible.builtin.stat:
    path: "{{ file_path }}"
  register: _trs_file_path_stat
  when:
    - file_path | length > 0

- name: Ensure validation requirements are met for file {{ file_path }}
  ansible.builtin.assert:
    that: "{{ condition }}"
    fail_msg: "The file file_path did not meet condition: {{ condition }}"
  loop:
    - _trs_file_path_stat.stat.isreg | default(false)
    - _trs_file_path_stat.stat.readable | default(false)
  loop_control:
    loop_var: condition
  when:
    - file_path | length > 0
