- name: Remove network
  become: true
  block:
    - name: Destroy network
      community.libvirt.virt_net:
        name: "{{ network_name }}"
        command: destroy

    - name: Undefine network
      community.libvirt.virt_net:
        name: "{{ network_name }}"
        command: undefine
  rescue:
    - name: Log network removal failure and continue
      ansible.builtin.debug:
        msg: "Network removal failed, continuing teardown"

- name: Delete existing bridges (if any)
  community.general.nmcli:
    conn_name: "{{ item }}"
    type: bridge
    state: absent
  loop:
    - "{{ vm_bridge_name }}"
    - "{{ vm_bridge_interface }}_{{ vm_bridge_name }}"
  failed_when: false
  become: true
  when: (DELETE_VM_BRIDGE | default(SETUP_VM_BRIDGE | default(true)))

- name: Delete existing bridges (if any)
  community.general.nmcli:
    conn_name: "{{ vm_bridge_name }}.{{ vm_vlan_tag }}"
    type: vlan
    state: absent
  failed_when: false
  become: true
  when:
    - (DELETE_VM_BRIDGE | default(SETUP_VM_BRIDGE | default(true)))
    - vm_vlan_tag is defined
