---
- name: Create temporary directory for tooling
  ansible.builtin.tempfile:
    state: directory
    prefix: om_tmp.
  register: _om_tmp_dir

- name: Set permissions on temporary directory
  ansible.builtin.file:
    path: "{{ _om_tmp_dir.path }}"
    mode: "0700"

- name: Extract latest oc-mirror
  ansible.builtin.unarchive:
    src: "https://mirror.openshift.com/pub/openshift-v4/x86_64/clients/ocp/latest/oc-mirror.tar.gz"
    dest: "{{ _om_tmp_dir.path }}"
    remote_src: true
    mode: "0755"
  register: _om_get_oc_mirror
  retries: 3
  delay: 60
  until: _om_get_oc_mirror is success

- name: Download stable opm client
  vars:
    ocp_clients_url:
      "https://mirror.openshift.com/pub/openshift-v4/x86_64/clients/ocp/stable\
      /opm-linux.tar.gz"
  ansible.builtin.unarchive:
    src: "{{ ocp_clients_url }}"
    dest: "{{ _om_tmp_dir.path }}"
    remote_src: true
    mode: "0755"
  register: _om_get_opm
  retries: 3
  delay: 10
  until: _om_get_opm is success

- name: Download jq binary
  ansible.builtin.get_url:
    url: "https://github.com/jqlang/jq/releases/download/jq-1.8.1/jq-linux-amd64"
    dest: "{{ _om_tmp_dir.path }}/jq"
    mode: "0755"
  register: _om_get_jq
  retries: 3
  delay: 60
  until: _om_get_jq is success
