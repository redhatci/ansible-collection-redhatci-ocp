---
- name: "Get release image digest"
  ansible.builtin.set_fact:
    mor_release_image_digest: "{{ mor_pull_url.split('@') | last | trim }}"
  when: mor_pull_url is search('@sha[0-9]+:')

- name: "Inspect release image to get digest when reference has a tag"
  ansible.builtin.command: >
    skopeo inspect
    --no-tags
    --authfile {{ mor_auths_file }}
    {%- if mor_allow_insecure_registry | bool %}
    --tls-verify=false
    {%- endif %}
    --format '{{ "{{" }} .Digest {{ "}}" }}'
    docker://{{ mor_pull_url | regex_replace('^docker://', '') }}
  register: _mor_skopeo_pull_digest
  changed_when: false
  when:
    - not (mor_pull_url is search('@sha[0-9]+:'))

- name: "Set mor_release_image_digest from skopeo (tag reference)"
  ansible.builtin.set_fact:
    mor_release_image_digest: "{{ _mor_skopeo_pull_digest.stdout | trim }}"
  when:
    - not (mor_pull_url is search('@sha[0-9]+:'))
    - _mor_skopeo_pull_digest is defined
    - _mor_skopeo_pull_digest.rc == 0

- name: Check if the release image is pullable from the local registry
  ansible.builtin.command: >
    skopeo inspect
    --no-tags
    --authfile {{ mor_auths_file }}
    {%- if mor_allow_insecure_registry | bool %}
    --tls-verify=false
    {%- endif %}
    docker://{{ mor_registry_url }}/{{ mor_registry_path }}/openshift/release-images@{{ mor_release_image_digest }}
  register: _mor_release_image
  failed_when: false
  when: not mor_force | bool

- name: Mirror the release to the local registry
  when:
    - (_mor_release_image is defined and
      _mor_release_image.rc is defined and
      _mor_release_image.rc != 0)
      or mor_force | bool
  block:

    - name: Create temporary directory for tooling
      ansible.builtin.tempfile:
        state: directory
        prefix: mirror_tmp.
      register: _mor_tmp_dir

    - name: Set permissions on temporary directory
      ansible.builtin.file:
        path: "{{ _mor_tmp_dir.path }}"
        mode: "0700"

    - name: Render ImageSetConfiguration for requested release
      ansible.builtin.template:
        src: ocp-release.yaml.j2
        dest: "{{ _mor_tmp_dir.path }}/ocp-release.yaml"
        mode: "0644"

    - name: Read ImageSetConfiguration content
      ansible.builtin.slurp:
        src: "{{ _mor_tmp_dir.path }}/ocp-release.yaml"
      register: _mor_imageset_config

    - name: Print ImageSetConfiguration content
      ansible.builtin.debug:
        msg: "{{ _mor_imageset_config.content | b64decode }}"

    - name: Extract latest oc-mirror
      ansible.builtin.unarchive:
        src: "{{ mor_oc_mirror_binary_url }}"
        dest: "{{ _mor_tmp_dir.path }}"
        remote_src: true
        mode: "0755"
      register: _mor_get_oc_mirror
      retries: 3
      delay: 60
      until: _mor_get_oc_mirror is success

    - name: Find an available ephemeral port for oc-mirror
      redhatci.ocp.find_available_port:
      register: _mor_ephemeral_port

    - name: Workaround oc-mirror v2 authfile issue
      no_log: true
      ansible.builtin.copy:
        src: "{{ mor_auths_file }}"
        remote_src: true
        dest: "$XDG_RUNTIME_DIR/containers/auth.json"
        mode: "0644"

    # Only GA and Candidate builds include signed images
    - name: Mirror the release to the local registry
      ansible.builtin.shell:
        cmd: >
          umask 0022 && env -u REGISTRY_AUTH_FILE
          {{ _mor_tmp_dir.path }}/oc-mirror --v2 --config={{ _mor_tmp_dir.path }}/ocp-release.yaml
          --authfile {{ mor_auths_file }}
          --workspace file://{{ _mor_tmp_dir.path }}
          docker://{{ mor_registry_url }}/{{ mor_registry_path }}
          --port {{ _mor_ephemeral_port.port }}
          {% if mor_allow_insecure_registry | bool %}
          --dest-tls-verify=false
          --src-tls-verify=false
          {% endif %}
          --ignore-release-signature
      register: _mor_cmd_output
      retries: 3
      delay: 10
      until: _mor_cmd_output.rc == 0
      changed_when: _mor_cmd_output.rc == 0

    - name: Remove authfile workaround oc-mirror
      no_log: true
      ansible.builtin.file:
        path: "$XDG_RUNTIME_DIR/containers/auth.json"
        state: absent

    - name: Write Image Source manifest
      ansible.builtin.copy:
        src: "{{ _mor_tmp_dir.path }}/working-dir/cluster-resources/idms-oc-mirror.yaml"
        dest: "{{ mor_cache_dir }}/{{ mor_version }}/imagesource.yaml"
        remote_src: true
        owner: "{{ mor_owner }}"
        group: "{{ mor_group }}"
        mode: "0644"
        setype: httpd_sys_content_t
      become: true

  always:
    - name: Clean up temporary directory
      ansible.builtin.file:
        path: "{{ _mor_tmp_dir.path }}"
        state: absent
...
