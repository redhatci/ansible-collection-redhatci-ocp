---
- name: Configure firewalld
  when: firewall != "iptables"
  tags: firewall
  block:
    - name: Enable HTTP for firewalld
      ansible.posix.firewalld:
        service: http
        permanent: true
        state: enabled
        immediate: true
      become: true

    - name: Open port for cache via firewalld
      ansible.posix.firewalld:
        port: "{{ webserver_caching_port }}/tcp"
        permanent: true
        state: enabled
        zone: "public"
        immediate: true
      become: true
      when: cache_enabled|bool

- name: Configure iptables
  when: firewall == "iptables"
  tags: firewall
  block:
    - name: Enable HTTP for iptables
      ansible.builtin.iptables:
        chain: INPUT
        protocol: tcp
        destination_port: "80"
        jump: ACCEPT
      become: true

    - name: Open port for cache via iptables
      ansible.builtin.iptables:
        chain: INPUT
        protocol: tcp
        destination_port: "{{ webserver_caching_port }}"
        jump: ACCEPT
      become: true
      when: cache_enabled|bool

    - name: Allow related and established connections for iptables
      ansible.builtin.iptables:
        chain: INPUT
        ctstate: ESTABLISHED,RELATED
        jump: ACCEPT
      become: true

    - name: Save iptables configuration
      ansible.builtin.shell: |
        /usr/sbin/iptables-save > /etc/sysconfig/iptables
      become: true
