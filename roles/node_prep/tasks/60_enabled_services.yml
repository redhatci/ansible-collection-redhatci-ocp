---
- name: Enable and restart Services
  ansible.builtin.service:
    name: "{{ item }}"
    state: restarted
    enabled: true
  become: true
  with_items:
    - libvirtd
  tags: services

- name: Enable Services (iptables)
  ansible.builtin.service:
    name: "{{ item }}"
    state: restarted
    enabled: true
  become: true
  with_items:
    - "{{ firewall }}"
  tags: services
  when: firewall == "iptables"

- name: Enable Services (firewalld)
  ansible.builtin.service:
    name: "{{ item }}"
    state: started
    enabled: true
  become: true
  with_items:
    - "{{ firewall }}"
  tags: services
  when: firewall != "iptables"
