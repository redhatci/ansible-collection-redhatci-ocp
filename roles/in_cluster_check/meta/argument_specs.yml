---
argument_specs:
  main:
    short_description: Run in-cluster checks which generate HTML report file. This report will be uploaded to DCI Control Server.
    description: |
      Main entry point for the `redhatci.ocp.in_cluster_check` role.
      Executes the Pen Drive container scanner, discovers HTML reports in the job logs path.
    options:
      icc_pullsecret_file:
        type: str
        required: true
        description: Registry auth file for podman
      icc_kubeconfig_path:
        type: str
        required: true
        description: Host kubeconfig path mounted into the scanner container
      icc_image:
        type: str
        required: true
        default: "registry.redhat.io/pen-drive/pen-drive-scanner-rhel9:1.0"
        description: In-cluster check container image
      icc_flow:
        type: str
        required: false
        default: "in-cluster-check"
        description: Flow option passed to the container entrypoint
        choices:
          - "in-cluster-check"
          - "gather"
          - "scan"
          - "full-run"
          - "kube-compare"
      icc_keep_must_gather_data:
        type: bool
        required: true
        default: false
        description: Keep must-gather data after the run
      icc_tls_verify:
        type: bool
        required: true
        default: false
        description: Verify tls flag
...
