---
# Integration tests for the oci_mirror role.
# Tests cover:
#   (a) Template rendering with om_helm_charts set -> assert helm: section present
#   (b) Template rendering without om_helm_charts  -> assert no helm: section
#   (c) om_operation validation assert logic

- name: Integration tests for oci_mirror role
  hosts: localhost
  gather_facts: false

  tasks:

    # ------------------------------------------------------------------ #
    # (a) Template rendering WITH om_helm_charts -> helm: section present #
    # ------------------------------------------------------------------ #
    - name: "TEST(a) - Create temp dir for template rendering"
      ansible.builtin.tempfile:
        state: directory
        prefix: oci_mirror_test.
      register: _tpl_dir_a

    - name: "TEST(a) - Render full-all-versions template with om_helm_charts"
      ansible.builtin.template:
        src: >-
          {{ playbook_dir | dirname | dirname | dirname | dirname }}/roles/oci_mirror/templates/full-all-versions.yaml.j2
        dest: "{{ _tpl_dir_a.path }}/imagesetconfig.yaml"
        mode: "0644"
      vars:
        om_source_index: "registry.example.com/redhat/redhat-operator-index:v4.20"
        om_helm_charts:
          - name: my-charts
            url: "https://charts.example.com"
            charts:
              - name: my-app
                version: "1.2.3"

    - name: "TEST(a) - Read rendered template"
      ansible.builtin.slurp:
        src: "{{ _tpl_dir_a.path }}/imagesetconfig.yaml"
      register: _tpl_a_content

    - name: "TEST(a) - Assert helm: section is present"
      ansible.builtin.assert:
        that:
          - "'helm:' in (_tpl_a_content.content | b64decode)"
          - "'repositories:' in (_tpl_a_content.content | b64decode)"
          - "'my-charts' in (_tpl_a_content.content | b64decode)"
        fail_msg: "Expected helm: section not found in rendered template"
        success_msg: "TEST(a) PASSED: helm: section present when om_helm_charts is set"

    - name: "TEST(a) - Cleanup"
      ansible.builtin.file:
        path: "{{ _tpl_dir_a.path }}"
        state: absent

    # ------------------------------------------------------------------ #
    # (b) Template rendering WITHOUT om_helm_charts -> no helm: section   #
    # ------------------------------------------------------------------ #
    - name: "TEST(b) - Create temp dir for template rendering"
      ansible.builtin.tempfile:
        state: directory
        prefix: oci_mirror_test.
      register: _tpl_dir_b

    - name: "TEST(b) - Render full-all-versions template without om_helm_charts"
      ansible.builtin.template:
        src: >-
          {{ playbook_dir | dirname | dirname | dirname | dirname }}/roles/oci_mirror/templates/full-all-versions.yaml.j2
        dest: "{{ _tpl_dir_b.path }}/imagesetconfig.yaml"
        mode: "0644"
      vars:
        om_source_index: "registry.example.com/redhat/redhat-operator-index:v4.20"
        om_helm_charts: []

    - name: "TEST(b) - Read rendered template"
      ansible.builtin.slurp:
        src: "{{ _tpl_dir_b.path }}/imagesetconfig.yaml"
      register: _tpl_b_content

    - name: "TEST(b) - Assert no helm: section"
      ansible.builtin.assert:
        that:
          - "'helm:' not in (_tpl_b_content.content | b64decode)"
        fail_msg: "Unexpected helm: section found when om_helm_charts is empty"
        success_msg: "TEST(b) PASSED: no helm: section when om_helm_charts is empty"

    - name: "TEST(b) - Cleanup"
      ansible.builtin.file:
        path: "{{ _tpl_dir_b.path }}"
        state: absent

    # ------------------------------------------------------------------ #
    # (c) om_operation validation: invalid value must fail the role assert #
    # ------------------------------------------------------------------ #
    - name: "TEST(c) - Verify role rejects invalid om_operation"
      block:
        - name: "TEST(c) - Include role tasks with invalid om_operation"
          ansible.builtin.include_tasks:
            file: >-
              {{ playbook_dir | dirname | dirname | dirname | dirname }}/roles/oci_mirror/tasks/main.yml
          vars:
            om_operation: invalid_op
            om_workspace_dir: /tmp
            om_helm_charts: []

        - name: "TEST(c) - Fail if role did not reject invalid om_operation"
          ansible.builtin.fail:
            msg: "om_operation validation unexpectedly passed for 'invalid_op'"

      rescue:
        - name: "TEST(c) - Assert rejection was specifically from om_operation validation"
          ansible.builtin.assert:
            that:
              - ansible_failed_result is defined
              - "'om_operation must be one of' in (ansible_failed_result.msg | default(''))"
            fail_msg: >
              TEST(c) FAILED: rescue caught an unexpected error, not om_operation validation.
              Error: {{ ansible_failed_result.msg | default('no message') }}
            success_msg: "TEST(c) PASSED: role correctly rejected invalid om_operation"

    - name: All integration tests passed
      ansible.builtin.debug:
        msg: "All oci_mirror integration tests completed successfully."
